services:
  - type: web
    name: hyacine-server
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: hyacine-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: hyacine-redis
          property: connectionString
  - type: redis
    name: hyacine-redis
    plan: free
    ipAllowList: []

databases:
  - name: hyacine-db
    plan: free
    databaseName: hyacine
    user: hyacine
