services:
  - type: web
    name: hyacine-server
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: CORS_ORIGIN
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: hyacine-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: hyacine-redis
          property: connectionString
      - key: NETEASE_API_BASE
        fromService:
          type: web
          name: hyacine-netease
          envVarKey: RENDER_EXTERNAL_URL
  - type: web
    name: hyacine-netease
    runtime: image
    plan: free
    image:
      url: docker.io/binaryify/netease_cloud_music_api:latest
    envVars:
      - key: PORT
        value: "3000"
  - type: redis
    name: hyacine-redis
    plan: free
    ipAllowList: []

databases:
  - name: hyacine-db
    plan: free
    databaseName: hyacine
    user: hyacine