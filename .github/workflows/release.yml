name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            goarm: ""
          - goos: linux
            goarch: arm64
            goarm: ""
          - goos: linux
            goarch: arm
            goarm: "7"
          - goos: darwin
            goarch: arm64
            goarm: ""
          - goos: windows
            goarch: amd64
            goarm: ""
            extension: .exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          check-latest: true
      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: go build -trimpath -ldflags="-s -w" -o "hyacine-go-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm }}${{ matrix.extension }}" ./cmd/hyacine-server
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: hyacine-go-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm }}
          path: hyacine-go-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm }}${{ matrix.extension }}
          if-no-files-found: error
          retention-days: 14

  create-release:
    name: Create GitHub Release
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Hyacine Go Backend v${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: artifacts/**/*