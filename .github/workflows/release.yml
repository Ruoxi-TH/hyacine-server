name: Backend Release

on:
  push:
    branches: [go-backend-rewrite]
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version, for example 1.1 or Beta1.1. Leave empty for the next Beta version."
        required: false
        type: string
      prerelease:
        description: "Publish as prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: backend-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip release]')
    runs-on: ubuntu-latest
    outputs:
      value: ${{ steps.next.outputs.value }}
      prerelease: ${{ steps.next.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: next
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$REQUESTED_VERSION" ]; then
            if [[ ! "$REQUESTED_VERSION" =~ ^(Beta)?[0-9]+\.[0-9]+$ ]]; then
              echo "Version must be 1.1 or Beta1.1" >&2
              exit 1
            fi
            echo "value=$REQUESTED_VERSION" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ inputs.prerelease }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          latest=$(git tag -l --sort=-version:refname | awk '/^vBeta[0-9]+\.[0-9]+$/ { sub(/^vBeta/, ""); print; exit }')
          if [ -n "$latest" ]; then
            major=${latest%%.*}
            minor=${latest##*.}
          else
            stable=$(git tag -l --sort=-version:refname | awk '/^v[0-9]+\.[0-9]+$/ { sub(/^v/, ""); print; exit }')
            stable=${stable:-1.0}
            major=${stable%%.*}
            minor=${stable##*.}
          fi
          echo "value=Beta${major}.$((minor + 1))" >> "$GITHUB_OUTPUT"
          echo "prerelease=true" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            suffix: linux-armv7
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            extension: .exe
            suffix: windows-amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          check-latest: true
      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          VERSION: ${{ needs.version.outputs.value }}
        run: go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "hyacine-server-${{ matrix.suffix }}${{ matrix.extension }}" ./cmd/hyacine-server
      - uses: actions/upload-artifact@v4
        with:
          name: hyacine-server-${{ matrix.suffix }}
          path: hyacine-server-${{ matrix.suffix }}${{ matrix.extension }}
          if-no-files-found: error
          retention-days: 14

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.value }}
          name: "Hyacine Server ${{ needs.version.outputs.value }}"
          prerelease: ${{ needs.version.outputs.prerelease }}
          generate_release_notes: true
          files: artifacts/**/*
