name: Build Single Image

on:
  push:
    branches: [master]
    paths:
      - "Dockerfile.single"
      - "docker/single/**"
      - "src/**"
      - "prisma/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig*.json"
      - "nest-cli.json"
      - ".github/workflows/build-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/ruoxi-th/hyacine-server
  PACKAGE_NAME: hyacine-server

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.single
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_IMAGE=node:20-alpine

      # GITHUB_TOKEN 通常无法改 package visibility（会 404/403）。
      # 这一步失败不能让整次构建变红：镜像已经 push 成功。
      - name: Try make GHCR package public (best effort)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.PACKAGE_WRITE_TOKEN || secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set +e
          echo "try user package API"
          code1=$(curl -sS -o /tmp/pkg1.json -w '%{http_code}' \
            -X PATCH "https://api.github.com/user/packages/container/${PACKAGE_NAME}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d '{"visibility":"public"}')
          echo "user API HTTP $code1"
          cat /tmp/pkg1.json || true
          echo
          echo "try users/{owner} package API"
          code2=$(curl -sS -o /tmp/pkg2.json -w '%{http_code}' \
            -X PATCH "https://api.github.com/users/${OWNER}/packages/container/${PACKAGE_NAME}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d '{"visibility":"public"}')
          echo "users API HTTP $code2"
          cat /tmp/pkg2.json || true
          echo
          if [[ "$code1" == "200" || "$code2" == "200" ]]; then
            echo "package is public"
            exit 0
          fi
          echo "could not set public automatically (normal with GITHUB_TOKEN)."
          echo "set package public once in GitHub UI, or add secret PACKAGE_WRITE_TOKEN (classic PAT: write:packages,read:packages,repo)."
          exit 0