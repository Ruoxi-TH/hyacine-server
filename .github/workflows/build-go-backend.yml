name: Build Go Backend

on:
  push:
    branches: [go-backend-rewrite]
    paths:
      - "**.go"
      - "go.mod"
      - "run.sh"
      - "README.md"
      - ".github/workflows/build-go-backend.yml"
  pull_request:
    paths:
      - "**.go"
      - "go.mod"
      - "run.sh"
      - "README.md"
      - ".github/workflows/build-go-backend.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            goarm: ""
          - goos: linux
            goarch: arm64
            goarm: ""
          - goos: linux
            goarch: arm
            goarm: "7"
          - goos: darwin
            goarch: arm64
            goarm: ""
          - goos: windows
            goarch: amd64
            goarm: ""
            extension: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          check-latest: true

      - name: Test
        run: go test ./...

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: go build -trimpath -ldflags="-s -w" -o "hyacine-go-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm }}${{ matrix.extension }}" ./cmd/hyacine-server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyacine-go-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm }}
          path: hyacine-go-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm }}${{ matrix.extension }}
          if-no-files-found: error
          retention-days: 14
