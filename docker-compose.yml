services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
    image: hyacine-server:latest
    container_name: hyacine-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://hyacine:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/hyacine?schema=public
      REDIS_URL: redis://redis:6379
      NETEASE_API_BASE: http://netease:3000
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      netease:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  netease:
    image: ${NETEASE_IMAGE:-binaryify/netease_cloud_music_api:latest}
    container_name: hyacine-netease
    restart: unless-stopped
    environment:
      PORT: 3000
    expose:
      - "3000"

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: hyacine-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hyacine
      POSTGRES_USER: hyacine
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    # 不映射主机 5432，避免和宝塔自带 postgres 冲突
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hyacine -d hyacine"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: hyacine-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    # 不映射主机 6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data: