<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyacine Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f0f1a;
            --bg-gradient: linear-gradient(135deg, #0f0f1a 0%, #162745 34%, #151a33 68%, #1d1a3a 100%);
            --surface: rgba(18, 26, 42, 0.44);
            --surface-overlay: rgba(25, 34, 54, 0.20);
            --border: rgba(255, 255, 255, 0.28);
            --text: #f0f0f5;
            --muted: #8b8fa3;
            --accent: #7C3AED;
            --success: #22C55E;
            --danger: #EF4444;
            --warning: #F97316;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            background-image: var(--bg-gradient);
            color: var(--text);
            min-height: 100vh;
        }
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .login-card h1 {
            font-size: 28px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 8px;
        }
        .login-card p {
            color: var(--muted);
            text-align: center;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 14px;
            background: var(--surface-overlay);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            font-size: 15px;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #203e60, #6b9cc0, #274561);
            color: white;
        }
        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:disabled { opacity: 0.5; }
        .error {
            color: var(--danger);
            font-size: 14px;
            text-align: center;
            margin-top: 16px;
        }
        
        /* Dashboard */
        .app-container { display: none; }
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 240px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            padding: 20px;
        }
        .sidebar h2 {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 32px;
            padding-left: 12px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 4px;
            transition: background 0.2s;
        }
        .nav-item:hover { background: var(--surface-overlay); }
        .nav-item.active { background: var(--accent); }
        .nav-item svg { width: 20px; height: 20px; }
        .main {
            margin-left: 240px;
            padding: 40px;
        }
        .page { display: none; }
        .page.active { display: block; }
        .page h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .page h1 + p { color: var(--muted); margin-bottom: 32px; }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 20px;
        }
        .stat-card .label { color: var(--muted); font-size: 12px; }
        .stat-card .value { font-size: 36px; font-weight: 800; margin-top: 8px; }
        
        /* Users Table */
        .card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .search-input {
            padding: 10px 14px;
            background: var(--surface-overlay);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            width: 250px;
        }
        .user-row {
            display: flex;
            align-items: center;
            padding: 16px;
            border-radius: 14px;
            margin-bottom: 8px;
            background: var(--surface-overlay);
        }
        .user-info { flex: 1; }
        .user-info h3 { font-size: 15px; font-weight: 600; }
        .user-info p { font-size: 12px; color: var(--muted); }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            margin-left: 8px;
        }
        .badge-admin { background: rgba(124, 58, 237, 0.3); color: var(--accent); }
        .badge-banned { background: rgba(239, 68, 68, 0.3); color: var(--danger); }
        .btn-sm {
            padding: 8px 14px;
            border: none;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-left: 8px;
        }
        .btn-ban { background: rgba(239, 68, 68, 0.2); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.4); }
        .btn-unban { background: rgba(34, 197, 94, 0.2); color: var(--success); border: 1px solid rgba(34, 197, 94, 0.4); }
        .btn-promote { background: rgba(124, 58, 237, 0.2); color: var(--accent); border: 1px solid rgba(124, 58, 237, 0.4); }
        .btn-delete { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }
        
        /* Settings */
        .settings-group {
            margin-bottom: 24px;
        }
        .settings-group label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .settings-group input {
            width: 100%;
            padding: 14px;
            background: var(--surface-overlay);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            font-size: 15px;
        }
        .btn-logout {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.4);
            margin-top: 32px;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 24px;
            width: 400px;
        }
        .modal-content h3 { margin-bottom: 16px; }
        .modal-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .modal-buttons .btn { flex: 1; }
        .btn-secondary {
            background: var(--surface-overlay);
            color: var(--text);
            border: 1px solid var(--border);
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 14px 20px;
            border-radius: 12px;
            font-weight: 600;
            z-index: 1001;
            animation: slideIn 0.3s;
        }
        .toast.success { background: var(--success); color: white; }
        .toast.error { background: var(--danger); color: white; }
        @keyframes slideIn {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="login-container" id="loginPage">
        <div class="login-card">
            <h1>Hyacine Admin</h1>
            <p>登录以管理服务器</p>
            <form id="loginForm">
                <div class="form-group">
                    <label>邮箱</label>
                    <input type="email" id="loginEmail" required placeholder="admin@example.com">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">登录</button>
                <p class="error" id="loginError"></p>
            </form>
        </div>
    </div>

    <div class="app-container" id="appPage">
        <nav class="sidebar">
            <h2>Hyacine</h2>
            <div class="nav-item active" data-page="dashboard">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                <span>仪表盘</span>
            </div>
            <div class="nav-item" data-page="users">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span>用户管理</span>
            </div>
            <div class="nav-item" data-page="settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                <span>设置</span>
            </div>
        </nav>
        <main class="main">
            <div class="page active" id="dashboardPage">
                <h1>仪表盘</h1>
                <p>服务器概览</p>
                <div class="stats-grid" id="statsGrid"></div>
                <div class="card">
                    <h3>服务器状态</h3>
                    <p style="color: var(--muted); margin-top: 12px;">后端地址：<span id="serverUrl"></span></p>
                </div>
            </div>
            
            <div class="page" id="usersPage">
                <h1>用户管理</h1>
                <p id="userCount">0 个注册用户</p>
                <div class="card">
                    <div class="card-header">
                        <input type="text" class="search-input" id="userSearch" placeholder="搜索用户...">
                    </div>
                    <div id="usersList"></div>
                </div>
            </div>
            
            <div class="page" id="settingsPage">
                <h1>设置</h1>
                <p>SMTP 邮件配置</p>
                <div class="card">
                    <div class="settings-group">
                        <label>SMTP 主机</label>
                        <input type="text" id="smtpHost" placeholder="smtp.example.com">
                    </div>
                    <div class="settings-group">
                        <label>端口</label>
                        <input type="number" id="smtpPort" placeholder="587">
                    </div>
                    <div class="settings-group">
                        <label>用户名</label>
                        <input type="text" id="smtpUser" placeholder="user@example.com">
                    </div>
                    <div class="settings-group">
                        <label>密码</label>
                        <input type="password" id="smtpPassword" placeholder="••••••••">
                    </div>
                    <div class="settings-group">
                        <label>发件地址</label>
                        <input type="text" id="smtpFrom" placeholder="Hyacine Music &lt;noreply@example.com&gt;">
                    </div>
                    <button class="btn btn-primary" id="saveSettings">保存</button>
                    <button class="btn btn-logout" id="logoutBtn">退出登录</button>
                </div>
            </div>
        </main>
    </div>

    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <h3 id="modalTitle">确认操作</h3>
            <p id="modalMessage"></p>
            <div class="modal-buttons">
                <button class="btn btn-secondary" id="modalCancel">取消</button>
                <button class="btn btn-primary" id="modalConfirm">确认</button>
            </div>
        </div>
    </div>

    <script>
        const API = '/api/v1';
        let token = localStorage.getItem('admin_token');
        let users = [];
        
        // Check auth on load
        if (token) {
            showApp();
            loadStats();
            loadUsers();
            loadConfig();
        }
        
        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const error = document.getElementById('loginError');
            btn.disabled = true;
            btn.textContent = '登录中...';
            error.textContent = '';
            
            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('loginEmail').value,
                        password: document.getElementById('loginPassword').value
                    })
                });
                const data = await res.json();
                if (data.token) {
                    token = data.token;
                    localStorage.setItem('admin_token', token);
                    showApp();
                    loadStats();
                    loadUsers();
                    loadConfig();
                } else {
                    error.textContent = data.message || '登录失败';
                }
            } catch (err) {
                error.textContent = '网络错误';
            }
            btn.disabled = false;
            btn.textContent = '登录';
        });
        
        function showApp() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('appPage').style.display = 'block';
            document.getElementById('serverUrl').textContent = location.origin;
        }
        
        // Navigation
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(`${item.dataset.page}Page`).classList.add('active');
            });
        });
        
        // Load stats
        async function loadStats() {
            try {
                const res = await fetch(`${API}/admin/stats`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card"><div class="label">总用户</div><div class="value" style="color: var(--accent)">${data.total_users || 0}</div></div>
                    <div class="stat-card"><div class="label">活跃用户</div><div class="value" style="color: var(--success)">${data.active_users || 0}</div></div>
                    <div class="stat-card"><div class="label">封禁用户</div><div class="value" style="color: var(--danger)">${data.banned_users || 0}</div></div>
                    <div class="stat-card"><div class="label">管理员</div><div class="value" style="color: var(--warning)">${data.admin_users || 0}</div></div>
                `;
            } catch (err) {}
        }
        
        // Load users
        async function loadUsers() {
            try {
                const res = await fetch(`${API}/admin/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                users = data.users || [];
                renderUsers(users);
            } catch (err) {}
        }
        
        function renderUsers(list) {
            document.getElementById('userCount').textContent = `${list.length} 个注册用户`;
            document.getElementById('usersList').innerHTML = list.map(u => `
                <div class="user-row" style="opacity: ${u.banned ? 0.6 : 1}">
                    <div class="user-info">
                        <h3>${u.username}${u.role === 'admin' ? '<span class="badge badge-admin">admin</span>' : ''}${u.banned ? '<span class="badge badge-banned">已封禁</span>' : ''}</h3>
                        <p>${u.email}</p>
                    </div>
                    <button class="btn-sm ${u.banned ? 'btn-unban' : 'btn-ban'}" onclick="toggleBan(${u.id}, ${u.banned})">${u.banned ? '解封' : '封禁'}</button>
                    <button class="btn-sm btn-promote" onclick="toggleRole(${u.id}, '${u.role}')">${u.role === 'admin' ? '降权' : '提权'}</button>
                    <button class="btn-sm btn-delete" onclick="deleteUser(${u.id}, '${u.username}')">删除</button>
                </div>
            `).join('');
        }
        
        // Search users
        document.getElementById('userSearch').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            renderUsers(users.filter(u => u.username.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)));
        });
        
        // Actions
        async function toggleBan(id, banned) {
            if (!await confirmAction(banned ? '解封用户' : '封禁用户', banned ? '允许此用户重新登录？' : '禁止此用户登录？')) return;
            try {
                await fetch(`${API}/admin/users/${banned ? 'unban' : 'ban'}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: id, reason: banned ? '' : '管理员封禁' })
                });
                loadUsers();
                loadStats();
                toast('操作成功', 'success');
            } catch (err) { toast('操作失败', 'error'); }
        }
        
        async function toggleRole(id, role) {
            const newRole = role === 'admin' ? 'user' : 'admin';
            if (!await confirmAction('更改角色', `${role === 'admin' ? '降权' : '提权'}为 ${newRole}？`)) return;
            try {
                await fetch(`${API}/admin/users/promote`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: id, role: newRole })
                });
                loadUsers();
                loadStats();
                toast('操作成功', 'success');
            } catch (err) { toast('操作失败', 'error'); }
        }
        
        async function deleteUser(id, name) {
            if (!await confirmAction('删除用户', `永久删除 ${name}？此操作不可撤销。`)) return;
            try {
                await fetch(`${API}/admin/users/delete`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: id })
                });
                loadUsers();
                loadStats();
                toast('删除成功', 'success');
            } catch (err) { toast('删除失败', 'error'); }
        }
        
        // Config
        async function loadConfig() {
            try {
                const res = await fetch(`${API}/admin/config`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.smtp) {
                    document.getElementById('smtpHost').value = data.smtp.host || '';
                    document.getElementById('smtpPort').value = data.smtp.port || 587;
                    document.getElementById('smtpUser').value = data.smtp.user || '';
                    document.getElementById('smtpFrom').value = data.smtp.from || '';
                }
            } catch (err) {}
        }
        
        document.getElementById('saveSettings').addEventListener('click', async () => {
            try {
                await fetch(`${API}/admin/config/update`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        smtp: {
                            host: document.getElementById('smtpHost').value,
                            port: parseInt(document.getElementById('smtpPort').value) || 587,
                            user: document.getElementById('smtpUser').value,
                            password: document.getElementById('smtpPassword').value || undefined,
                            from: document.getElementById('smtpFrom').value
                        }
                    })
                });
                toast('保存成功', 'success');
                loadConfig();
            } catch (err) { toast('保存失败', 'error'); }
        });
        
        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('admin_token');
            location.reload();
        });
        
        // Modal
        let modalCallback = null;
        function confirmAction(title, message) {
            return new Promise(resolve => {
                document.getElementById('modalTitle').textContent = title;
                document.getElementById('modalMessage').textContent = message;
                document.getElementById('confirmModal').classList.add('show');
                modalCallback = resolve;
            });
        }
        document.getElementById('modalCancel').addEventListener('click', () => {
            document.getElementById('confirmModal').classList.remove('show');
            modalCallback(false);
        });
        document.getElementById('modalConfirm').addEventListener('click', () => {
            document.getElementById('confirmModal').classList.remove('show');
            modalCallback(true);
        });
        
        // Toast
        function toast(msg, type) {
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
    </script>
</body>
</html>
